<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VIDAKOVIĆ - Pristup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #0a0f1e 0%, #0d1b2a 50%, #0f2133 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(56,189,248,0.3);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .pin-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      transition: all 0.15s ease;
    }
    .pin-dot.filled {
      background: #38bdf8;
      border-color: #38bdf8;
      box-shadow: 0 0 10px rgba(56,189,248,0.6);
      transform: scale(1.1);
    }
    .pin-dot.error {
      background: #ef4444;
      border-color: #ef4444;
      box-shadow: 0 0 10px rgba(239,68,68,0.6);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .key {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 500;
      height: 64px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .key:active, .key.pressed {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.4);
      transform: scale(0.94);
    }
    .key.del {
      font-size: 20px;
      color: #94a3b8;
    }
    .key.enter {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(56,189,248,0.3);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .key.enter:active {
      transform: scale(0.94);
      box-shadow: 0 2px 8px rgba(56,189,248,0.2);
    }
    .key-zero { grid-column: 2; }

    .status {
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #64748b;
      transition: color 0.2s;
    }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    .status.loading { color: #38bdf8; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.5s ease; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">🏠</div>
    <h1>VIDAKOVIĆ</h1>
    <p>Kontrola pristupa</p>
  </div>

  <div id="pinScreen">
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key del" id="delBtn">⌫</button>
      <button class="key key-zero" data-n="0">0</button>
      <button class="key enter" id="enterBtn">OK</button>
    </div>

    <div class="status" id="pinStatus"></div>
  </div>
</div>

<script>
  const GATE_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6";
  const PIN_HASH = "b4aae044ca25626d203d4b93508c6330d4f6577fa84af003df907564358aeafd";
  const PIN_LENGTH = 4;

  let pin = "";
  let checking = false;

  document.getElementById("keypad").addEventListener("click", e => {
    const key = e.target.closest(".key");
    if (!key || checking) return;

    if (key.dataset.n !== undefined) pressDigit(key.dataset.n);
    else if (key.id === "delBtn") pressDelete();
    else if (key.id === "enterBtn") submitPin();
  });

  document.addEventListener("keydown", e => {
    if (checking) return;
    if (e.key >= "0" && e.key <= "9") pressDigit(e.key);
    else if (e.key === "Backspace") pressDelete();
    else if (e.key === "Enter") submitPin();
  });

  function pressDigit(n) {
    if (pin.length >= PIN_LENGTH) return;
    pin += n;
    updateDots();
    if (pin.length === PIN_LENGTH) setTimeout(submitPin, 120);
  }

  function pressDelete() {
    pin = pin.slice(0, -1);
    updateDots();
    setStatus("");
  }

  function updateDots() {
    for (let i = 0; i < PIN_LENGTH; i++) {
      const dot = document.getElementById("d" + i);
      dot.classList.toggle("filled", i < pin.length);
      dot.classList.remove("error");
    }
  }

  function setStatus(msg, type = "") {
    const el = document.getElementById("pinStatus");
    el.textContent = msg;
    el.className = "status" + (type ? " " + type : "");
  }

  async function sha256(text) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function submitPin() {
    if (pin.length < PIN_LENGTH || checking) return;
    checking = true;

    const hash = await sha256(pin);
    if (hash !== PIN_HASH) {
      checking = false;
      wrongPin();
      return;
    }

    setStatus("⏳ Otvaranje...", "loading");
    try {
      const res = await fetch(GATE_WEBHOOK, { method: "POST" });
      if (res.ok) {
        setStatus("✅ Kapija se otvara!", "ok");
        setTimeout(resetPin, 3000);
      } else {
        setStatus("❌ Greška (" + res.status + ")", "err");
        setTimeout(resetPin, 2000);
      }
    } catch {
      setStatus("❌ Nema veze sa serverom", "err");
      setTimeout(resetPin, 2000);
    } finally {
      checking = false;
    }
  }

  function wrongPin(msg = "❌ Pogrešan PIN") {
    setStatus(msg, "err");
    for (let i = 0; i < PIN_LENGTH; i++) {
      const dot = document.getElementById("d" + i);
      dot.classList.add("error");
      dot.classList.remove("filled");
    }
    const display = document.getElementById("pinDisplay");
    display.classList.remove("shake");
    void display.offsetWidth;
    display.classList.add("shake");

    setTimeout(() => {
      resetPin();
      display.classList.remove("shake");
    }, 600);
  }

  function resetPin() {
    pin = "";
    updateDots();
    setStatus("");
  }
</script>
</body>
</html>
