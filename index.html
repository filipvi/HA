<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kontrola kapije</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Otvori kapiju</h1>

  <button onclick="otvoriKapiju()">OTVORI</button>

  <div id="status"></div>

  <script>
    async function otvoriKapiju() {
      const status = document.getElementById("status");

      status.innerText = "Šaljem zahtjev...";

      try {
        const res = await fetch("WEBHOOK_URL", {
          method: "POST"
        });

        if (res.ok) {
          status.innerText = "Kapija otvorena ✅";

          // kratka pauza pa redirect
          setTimeout(() => {
            window.location.href = "https://filipvi.github.io/HA/";
          }, 1500);

        } else {
          status.innerText = "Greška pri otvaranju ❌";
        }

      } catch (e) {
        status.innerText = "Neuspješno ❌";
      }
    }
  </script>

</body>
</html>
