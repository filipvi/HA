<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VIDAKOVIĆ kuća pristup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;

      padding: 28px;
      width: 100%;
      max-width: 380px;

      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 18px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      border-radius: 12px;
      border: none;

      text-align: center;
      font-size: 18px;

      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      font-size: 18px;
      font-weight: bold;

      border: none;
      border-radius: 12px;

      cursor: pointer;
    }

    .login {
      background: #f59e0b;
      color: black;
    }

    .gate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      font-size: 15px;
      min-height: 20px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .card {
        max-width: 95vw;
        padding: 22px;
      }

      input, button {
        font-size: 20px;
        padding: 18px;
      }

      h2 {
        font-size: 26px;
      }

      #status {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🔐 Kontrola pristupa</h2>

  <div id="pinBox">
    <input type="password" id="pin" placeholder="Unesi PIN">
    <button class="login" onclick="checkPin()">UNESI PIN</button>
  </div>

  <div id="controls" class="hidden">

    <button class="gate" id="btnGate" onclick="otvoriKapiju()">
      🚪 Otvori kapiju
    </button>

    <button class="gate" id="btnDoor" onclick="otkljucajVrata()">
      🔓 Otključaj vrata
    </button>

  </div>

  <div id="status"></div>

</div>

<script>

const GATE_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6";
const AUTH_WEBHOOK  = "https://vidakovic.ddnsfree.com/api/webhook/gate_auth";

function setLoading(state) {
  document.getElementById("btnGate").disabled = state;
  document.getElementById("btnDoor").disabled = state;
}

async function checkPin() {
  const pin = document.getElementById("pin").value;
  const status = document.getElementById("status");

  status.innerText = "⏳ Provjera PIN-a...";

  try {
    const res = await fetch(AUTH_WEBHOOK, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ pin })
    });

    const text = await res.text();

    if (res.ok && text.includes("OK")) {
      document.getElementById("pinBox").classList.add("hidden");
      document.getElementById("controls").classList.remove("hidden");
      status.innerText = "✅ Pristup odobren";
    } else {
      status.innerText = "❌ Krivi PIN";
    }

  } catch (e) {
    status.innerText = "❌ Greška u provjeri";
  }
}

async function sendAction(url, message, redirect = false) {
  const status = document.getElementById("status");

  status.innerText = "⏳ Šaljem...";
  setLoading(true);

  try {
    const res = await fetch(url, { method: "POST" });

    if (res.ok) {
      status.innerText = "✅ " + message;

      setTimeout(() => {
        if (redirect) {
          window.location.href = "https://filipvi.github.io/HA/";
        }
      }, 1200);

    } else {
      status.innerText = "❌ Greška";
    }

  } catch (e) {
    status.innerText = "❌ Neuspješno";
  }

  setLoading(false);
}

function otvoriKapiju() {
  sendAction(GATE_WEBHOOK, "Kapija otvorena", true);
}

function otkljucajVrata() {
  sendAction(GATE_WEBHOOK, "Vrata otključana", false);
}

</script>

</body>
</html>
