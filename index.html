<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VIDAKOVIĆ - Pristup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #0a0f1e 0%, #0d1b2a 50%, #0f2133 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(56,189,248,0.3);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    /* ── PIN display ── */
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      transition: all 0.15s ease;
    }
    .pin-dot.filled {
      background: #38bdf8;
      border-color: #38bdf8;
      box-shadow: 0 0 10px rgba(56,189,248,0.6);
      transform: scale(1.1);
    }
    .pin-dot.error {
      background: #ef4444;
      border-color: #ef4444;
      box-shadow: 0 0 10px rgba(239,68,68,0.6);
    }

    /* ── Keypad ── */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .key {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 500;
      height: 64px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s ease, transform 0.1s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }
    .key:active, .key.pressed {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.4);
      transform: scale(0.94);
    }
    .key.del {
      font-size: 20px;
      color: #94a3b8;
    }
    .key.enter {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(56,189,248,0.3);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .key.enter:active {
      transform: scale(0.94);
      box-shadow: 0 2px 8px rgba(56,189,248,0.2);
    }
    .key-zero { grid-column: 2; }

    /* ── Status ── */
    .status {
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #64748b;
      transition: color 0.2s;
    }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    .status.loading { color: #38bdf8; }

    /* ── Shake animation ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.5s ease; }

    .hidden { display: none !important; }

    /* ── Action screen ── */
    #actionScreen { display: none; text-align: center; }

    .action-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { transform: scale(0.97); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-gate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 8px 24px rgba(34,197,94,0.3);
    }
    .btn-door {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 8px 24px rgba(245,158,11,0.3);
    }

    .session-info {
      font-size: 12px;
      color: #475569;
      margin-bottom: 20px;
    }
    .session-timer { color: #38bdf8; font-weight: 600; }

    .logout-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .logout-btn:hover { color: #94a3b8; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">🏠</div>
    <h1>VIDAKOVIĆ</h1>
    <p>Kontrola pristupa</p>
  </div>

  <!-- PIN screen -->
  <div id="pinScreen">
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" onclick="pressDigit('1')">1</button>
      <button class="key" onclick="pressDigit('2')">2</button>
      <button class="key" onclick="pressDigit('3')">3</button>
      <button class="key" onclick="pressDigit('4')">4</button>
      <button class="key" onclick="pressDigit('5')">5</button>
      <button class="key" onclick="pressDigit('6')">6</button>
      <button class="key" onclick="pressDigit('7')">7</button>
      <button class="key" onclick="pressDigit('8')">8</button>
      <button class="key" onclick="pressDigit('9')">9</button>
      <button class="key del" onclick="pressDelete()">⌫</button>
      <button class="key key-zero" onclick="pressDigit('0')">0</button>
      <button class="key enter" onclick="submitPin()">OK</button>
    </div>

    <div class="status" id="pinStatus"></div>
  </div>

  <!-- Action screen -->
  <div id="actionScreen">
    <div class="session-info">
      Sesija ističe za <span class="session-timer" id="timerDisplay">5:00</span>
    </div>
    <button class="action-btn btn-gate" id="gateBtn" onclick="callWebhook('gate')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px">
        <line x1="2" y1="4" x2="2" y2="20"/><line x1="22" y1="4" x2="22" y2="20"/>
        <line x1="2" y1="8" x2="12" y2="8"/><line x1="2" y1="16" x2="12" y2="16"/>
        <line x1="5" y1="8" x2="5" y2="16"/><line x1="8.5" y1="8" x2="8.5" y2="16"/>
        <line x1="12" y1="7" x2="12" y2="17"/>
        <line x1="12" y1="8" x2="22" y2="8"/><line x1="12" y1="16" x2="22" y2="16"/>
        <line x1="15.5" y1="8" x2="15.5" y2="16"/><line x1="19" y1="8" x2="19" y2="16"/>
      </svg>Otvori kapiju
    </button>
    <button class="action-btn btn-door" id="doorBtn" onclick="callWebhook('door')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px">
        <path d="M3 21h18"/>
        <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/>
        <circle cx="15" cy="12" r="1.2" fill="white"/>
      </svg>Otključaj ulazna vrata
    </button>
    <div class="status" id="actionStatus"></div>
    <button class="logout-btn" onclick="logout()">Odjavi se</button>
  </div>
</div>

<script>
  const WEBHOOKS = {
    gate: "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6",
    door: "https://vidakovic.ddnsfree.com/api/webhook/ulazna_a8f3k2m9x7q4n1p6",
  };
  const PIN_HASH = "b4aae044ca25626d203d4b93508c6330d4f6577fa84af003df907564358aeafd";
  const PIN_LENGTH = 4;
  const SESSION_MINUTES = 5;

  let pin = "";
  let checking = false;
  let sessionTimer = null;
  let sessionSeconds = 0;

  if (Notification.permission === "default") Notification.requestPermission();

  function notify(title, body) {
    if (Notification.permission === "granted")
      new Notification(title, { body, icon: "https://filipvi.github.io/HA/icon.png" });
  }

  // ── PIN screen ──
  document.addEventListener("keydown", e => {
    if (document.getElementById("actionScreen").style.display !== "none") return;
    if (checking) return;
    if (e.key >= "0" && e.key <= "9") pressDigit(e.key);
    else if (e.key === "Backspace") pressDelete();
    else if (e.key === "Enter") submitPin();
  });

  function pressDigit(n) {
    if (pin.length >= PIN_LENGTH) return;
    pin += n;
    updateDots();
    if (pin.length === PIN_LENGTH) setTimeout(submitPin, 120);
  }

  function pressDelete() {
    pin = pin.slice(0, -1);
    updateDots();
    setPinStatus("");
  }

  function updateDots() {
    for (let i = 0; i < PIN_LENGTH; i++) {
      const dot = document.getElementById("d" + i);
      dot.classList.toggle("filled", i < pin.length);
      dot.classList.remove("error");
    }
  }

  function setPinStatus(msg, type = "") {
    const el = document.getElementById("pinStatus");
    el.textContent = msg;
    el.className = "status" + (type ? " " + type : "");
  }

  function setActionStatus(msg, type = "") {
    const el = document.getElementById("actionStatus");
    el.textContent = msg;
    el.className = "status" + (type ? " " + type : "");
  }

  async function sha256(text) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function submitPin() {
    if (pin.length < PIN_LENGTH || checking) return;
    checking = true;

    const hash = await sha256(pin);
    if (hash !== PIN_HASH) {
      checking = false;
      wrongPin();
      return;
    }

    checking = false;
    setPinStatus("✅ Pristup odobren", "ok");
    setTimeout(showActionScreen, 400);
  }

  function wrongPin(msg = "❌ Pogrešan PIN") {
    setPinStatus(msg, "err");
    for (let i = 0; i < PIN_LENGTH; i++) {
      const dot = document.getElementById("d" + i);
      dot.classList.add("error");
      dot.classList.remove("filled");
    }
    const display = document.getElementById("pinDisplay");
    display.classList.remove("shake");
    void display.offsetWidth;
    display.classList.add("shake");
    setTimeout(() => {
      pin = ""; updateDots(); setPinStatus("");
      display.classList.remove("shake");
    }, 600);
  }

  // ── Action screen ──
  function showActionScreen() {
    document.getElementById("pinScreen").style.display = "none";
    document.getElementById("actionScreen").style.display = "block";
    startSessionTimer();
  }

  function startSessionTimer() {
    sessionSeconds = SESSION_MINUTES * 60;
    updateTimerDisplay();
    clearInterval(sessionTimer);
    sessionTimer = setInterval(() => {
      sessionSeconds--;
      updateTimerDisplay();
      if (sessionSeconds <= 0) logout();
    }, 1000);
  }

  function updateTimerDisplay() {
    const m = Math.floor(sessionSeconds / 60);
    const s = sessionSeconds % 60;
    document.getElementById("timerDisplay").textContent = m + ":" + String(s).padStart(2, "0");
  }

  async function callWebhook(type) {
    const btns = document.querySelectorAll(".action-btn");
    btns.forEach(b => b.disabled = true);
    setActionStatus("⏳ Slanje...", "loading");

    try {
      const res = await fetch(WEBHOOKS[type], { method: "POST" });
      if (res.ok) {
        if (type === "gate") {
          setActionStatus("✅ Kapija se otvara!", "ok");
          notify("🚪 Kapija", "Kapija se otvara!");
        } else {
          setActionStatus("✅ Ulazna vrata otključana!", "ok");
          notify("🔓 Ulazna vrata", "Ulazna vrata otključana!");
        }
        startSessionTimer();
        setTimeout(() => setActionStatus(""), 3000);
      } else {
        setActionStatus("❌ Greška (" + res.status + ")", "err");
      }
    } catch {
      setActionStatus("❌ Nema veze sa serverom", "err");
    } finally {
      btns.forEach(b => b.disabled = false);
    }
  }

  function logout() {
    clearInterval(sessionTimer);
    pin = ""; updateDots(); setPinStatus(""); setActionStatus("");
    document.getElementById("actionScreen").style.display = "none";
    document.getElementById("pinScreen").style.display = "block";
  }
</script>
</body>
</html>
