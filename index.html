<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vidaković kuća</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      width: 340px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: bold;
    }

    .gate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .gate:hover {
      transform: scale(1.03);
    }

    .door {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    .door:hover {
      transform: scale(1.03);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
      opacity: 0.9;
    }

    .title {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="title">Kontrola pristupa</div>
  <div class="subtitle"></div>

  <button class="gate" id="btnGate" onclick="otvoriKapiju()">
    🚪 Otvori kapiju
  </button>

  <button class="door" id="btnDoor" onclick="otkljucajVrata()">
    🔓 Otključaj vrata
  </button>

  <div id="status"></div>

</div>

<script>

const GATE_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6";
const DOOR_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/ulazna_a8f3k2m9x7q4n1p5";

function setLoading(state) {
  document.getElementById("btnGate").disabled = state;
  document.getElementById("btnDoor").disabled = state;
}

async function sendAction(url, message, redirect = false) {
  const status = document.getElementById("status");

  status.innerText = "⏳ Šaljem zahtjev...";
  setLoading(true);

  try {
    const res = await fetch(url, { method: "POST" });

    if (res.ok) {
      status.innerText = "✅ " + message;

      setTimeout(() => {
        if (redirect) {
          window.location.href = "https://filipvi.github.io/HA/";
        }
      }, 1200);

    } else {
      status.innerText = "❌ Greška";
    }

  } catch (e) {
    status.innerText = "❌ Neuspješno";
  }

  setLoading(false);
}

function otvoriKapiju() {
  sendAction(GATE_WEBHOOK, "Kapija otvorena", true);
}

function otkljucajVrata() {
  sendAction(DOOR_WEBHOOK, "Vrata otključana", false);
}

</script>

</body>
</html>
