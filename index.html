<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VIDAKOVIĆ kuća pristup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      width: 600px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 10px;
    }

   input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  text-align: center;
  font-size: 16px;
  box-sizing: border-box;
}

    input, button {
  border-radius: 12px;
}

.login {
  background: #f59e0b;
  color: black;
  width: 100%;
  box-sizing: border-box;
}

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .gate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .door {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {

  .card {
    width: 92vw;
    padding: 24px 18px;
    border-radius: 20px;
  }

  h2 {
    font-size: 26px;
    margin-bottom: 18px;
  }

  input {
    font-size: 22px;
    padding: 18px;
  }

  button {
    font-size: 22px;
    padding: 18px;
    margin: 14px 0;
  }

  #status {
    font-size: 18px;
    margin-top: 14px;
  }
}
  </style>

  
</head>

<body>

<div class="card">

  <h2>🔐 Kontrola pristupa</h2>

  <!-- PIN -->
  <div id="pinBox">
    <input type="password" id="pin" placeholder="Unesi PIN">
    <button class="login" onclick="checkPin()">UNESI PIN</button>
  </div>

  <!-- CONTROLS -->
  <div id="controls" class="hidden">

    <button class="gate" id="btnGate" onclick="otvoriKapiju()">
      🚪 Otvori kapiju
    </button>

    <button class="door" id="btnDoor" onclick="otkljucajVrata()">
      🔓 Otključaj vrata
    </button>

  </div>

  <div id="status"></div>

</div>

<script>

const PIN = "1234";

const GATE_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6";
const DOOR_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/ulazna_a8f3k2m9x7q4n1p5";

function checkPin() {
  const input = document.getElementById("pin").value;
  const status = document.getElementById("status");

  if (input === PIN) {
    document.getElementById("pinBox").classList.add("hidden");
    document.getElementById("controls").classList.remove("hidden");
    status.innerText = "✅ PIN ispravan";
  } else {
    status.innerText = "❌ Krivi PIN";
  }
}

function setLoading(state) {
  document.getElementById("btnGate").disabled = state;
  document.getElementById("btnDoor").disabled = state;
}

async function sendAction(url, message, redirect = false) {
  const status = document.getElementById("status");

  status.innerText = "⏳ Šaljem...";
  setLoading(true);

  try {
    const res = await fetch(url, { method: "POST" });

    if (res.ok) {
      status.innerText = "✅ " + message;

      setTimeout(() => {
        if (redirect) {
          window.location.href = "https://filipvi.github.io/HA/";
        }
      }, 1200);

    } else {
      status.innerText = "❌ Greška";
    }

  } catch (e) {
    status.innerText = "❌ Neuspješno";
  }

  setLoading(false);
}

function otvoriKapiju() {
  sendAction(GATE_WEBHOOK, "Kapija otvorena", true);
}

function otkljucajVrata() {
  sendAction(DOOR_WEBHOOK, "Vrata otključana", false);
}

</script>

</body>
</html>
