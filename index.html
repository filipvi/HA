<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VIDAKOVIĆ kuća pristup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;

      padding: 28px;
      width: 100%;
      max-width: 380px;

      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      border-radius: 12px;
      border: none;

      text-align: center;
      font-size: 18px;

      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      font-size: 18px;
      font-weight: bold;

      border: none;
      border-radius: 12px;

      cursor: pointer;
    }

    .login {
      background: #f59e0b;
      color: black;
    }

    .gate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    button:disabled {
      opacity: 0.5;
    }

    #status {
      margin-top: 12px;
      font-size: 15px;
      min-height: 20px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .card {
        max-width: 95vw;
        padding: 22px;
      }

      input, button {
        font-size: 20px;
        padding: 18px;
      }

      h2 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🔐 Kontrola pristupa</h2>

  <div id="pinBox">
    <input type="password" id="pin" placeholder="Unesi PIN">
    <button class="login" onclick="checkPin()">UNESI PIN</button>
  </div>

  <div id="controls" class="hidden">
    <button class="gate" onclick="otvoriKapiju()">🚪 Otvori kapiju</button>
  </div>

  <div id="status"></div>

</div>

<script>

const AUTH_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/gate_auth";
const GATE_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6";
  
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

async function checkPin() {
  const pin = document.getElementById("pin").value;

  setStatus("⏳ Provjera PIN-a...");

  try {
    const form = new URLSearchParams();
    form.append("pin", pin);

    const res = await fetch(AUTH_WEBHOOK, {
      method: "POST",
      body: form
    });

    const data = await res.json().catch(() => ({}));

    if (data.status === "ok") {
      document.getElementById("pinBox").classList.add("hidden");
      document.getElementById("controls").classList.remove("hidden");
      setStatus("✅ Pristup odobren");
    } else {
      setStatus("❌ Krivi PIN");
    }

  } catch (e) {
    setStatus("❌ Greška u komunikaciji");
  }
}

async function otvoriKapiju() {
  setStatus("⏳ Otvaram kapiju...");

  try {
    const res = await fetch(GATE_WEBHOOK, {
      method: "POST"
    });

    if (res.ok) {
      setStatus("✅ Kapija otvorena");
    } else {
      setStatus("❌ Greška");
    }

  } catch (e) {
    setStatus("❌ Neuspješno");
  }
}

</script>

</body>
</html>
