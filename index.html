<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VIDAKOVIĆ kuća pristup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;

      padding: 28px;
      width: 100%;
      max-width: 380px;

      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 18px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      border-radius: 12px;
      border: none;

      text-align: center;
      font-size: 18px;

      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      font-size: 18px;
      font-weight: bold;

      border: none;
      border-radius: 12px;

      cursor: pointer;
    }

    .login {
      background: #f59e0b;
      color: black;
    }

    .gate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .door {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      font-size: 15px;
      min-height: 20px;
      opacity: 0.9;
    }

    .hidden {
      display: none;
    }

    /* 📱 MOBILE OPTIMIZATION */
    @media (max-width: 600px) {

      .card {
        max-width: 95vw;
        padding: 22px;
        border-radius: 18px;
      }

      h2 {
        font-size: 26px;
      }

      input {
        font-size: 20px;
        padding: 16px;
      }

      button {
        font-size: 20px;
        padding: 18px;
      }

      #status {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🔐 Kontrola pristupa</h2>

  <!-- PIN -->
  <div id="pinBox">
    <input type="password" id="pin" placeholder="Unesi PIN">
    <button class="login" onclick="checkPin()">UNESI PIN</button>
  </div>

  <!-- CONTROLS -->
  <div id="controls" class="hidden">

    <button class="gate" id="btnGate" onclick="otvoriKapiju()">
      🚪 Otvori kapiju
    </button>

    <button class="door" id="btnDoor" onclick="otkljucajVrata()">
      🔓 Otključaj vrata
    </button>

  </div>

  <div id="status"></div>

</div>

<script>

const PIN = "1234";

const GATE_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/kapija_a8f3k2m9x7q4n1p6";
const DOOR_WEBHOOK = "https://vidakovic.ddnsfree.com/api/webhook/ulazna_a8f3k2m9x7q4n1p5";

function checkPin() {
  const input = document.getElementById("pin").value;
  const status = document.getElementById("status");

  if (input === PIN) {
    document.getElementById("pinBox").classList.add("hidden");
    document.getElementById("controls").classList.remove("hidden");
    status.innerText = "✅ PIN ispravan";
  } else {
    status.innerText = "❌ Krivi PIN";
  }
}

/* Enter tipka za PIN */
document.getElementById("pin").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    checkPin();
  }
});

function setLoading(state) {
  document.getElementById("btnGate").disabled = state;
  document.getElementById("btnDoor").disabled = state;
}

async function sendAction(url, message, redirect = false) {
  const status = document.getElementById("status");

  status.innerText = "⏳ Šaljem...";
  setLoading(true);

  try {
    const res = await fetch(url, { method: "POST" });

    if (res.ok) {
      status.innerText = "✅ " + message;

      setTimeout(() => {
        if (redirect) {
          window.location.href = "https://filipvi.github.io/HA/";
        }
      }, 1200);

    } else {
      status.innerText = "❌ Greška";
    }

  } catch (e) {
    status.innerText = "❌ Neuspješno";
  }

  setLoading(false);
}

function otvoriKapiju() {
  sendAction(GATE_WEBHOOK, "Kapija otvorena", true);
}

function otkljucajVrata() {
  sendAction(DOOR_WEBHOOK, "Vrata otključana", false);
}

</script>

</body>
</html>
